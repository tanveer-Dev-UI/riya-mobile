<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Riya Mobile Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="admin-page">
    <section class="admin-login" id="adminLoginBox">
      <h1>Admin Login</h1>
      <p>Authorized staff only</p>
      <label>
        <span>User ID</span>
        <input type="text" id="loginUserId" placeholder="Enter user id" />
      </label>
      <label>
        <span>Password</span>
        <input type="password" id="loginPassword" placeholder="Enter password" />
      </label>
      <button type="button" id="adminLoginBtn">Login</button>
      <p class="login-note" id="loginNote">Use credentials to access product controls.</p>
    </section>

    <section class="admin-dashboard hidden" id="adminDashboard">
      <div class="dashboard-head">
        <h2>Product Admin Panel</h2>
        <div class="head-actions">
          <a href="/">Open Website</a>
          <button type="button" id="adminLogoutBtn">Logout</button>
        </div>
      </div>

      <div class="admin-card">
        <label class="admin-field">
          <span>Search Product</span>
          <input type="search" id="adminSearchInput" placeholder="Type product name..." />
        </label>

        <label class="admin-field">
          <span>Select Product</span>
          <select id="adminProductSelect"></select>
        </label>

        <label class="admin-field">
          <span>Price</span>
          <input type="text" id="adminPriceInput" placeholder="₹00,000" />
        </label>

        <label class="admin-field">
          <span>Offer Text</span>
          <input type="text" id="adminOfferInput" placeholder="Eg: 10% Off + Free Cover" />
        </label>

        <label class="admin-check">
          <input type="checkbox" id="adminUnavailableInput" />
          <span>Mark as Unavailable</span>
        </label>

        <div class="admin-actions-row">
          <button type="button" id="saveAdminChanges">Save Changes</button>
          <button type="button" id="resetAdminChanges">Reset Product</button>
        </div>

        <p class="admin-note" id="adminStatusNote">Changes are saved to server and reflect on website instantly.</p>
      </div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
