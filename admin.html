<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login | Riya Mobile Shop</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin-page-body">
  <main class="admin-page">
    <section class="admin-auth-card" id="adminLoginPanel">
      <h1>Admin Login</h1>
      <p>Only authorized admins can access product controls.</p>
      <form id="adminLoginForm" class="admin-auth-form">
        <label>
          <span>User ID</span>
          <input id="adminUserId" type="text" value="admin" autocomplete="username" required />
        </label>
        <label>
          <span>Password</span>
          <input id="adminPassword" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit">Login</button>
      </form>
      <p id="adminLoginStatus" class="admin-auth-status"></p>
      <a href="index.html">Back to Store</a>
    </section>
  </main>
  <script src="admin.js"></script>
</body>
</html>
